
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
    margin:0;
        padding:0;
            box-sizing:border-box;
                font-family:Arial, sans-serif;
                }

                body{
                    height:100vh;
                        display:flex;
                            justify-content:center;
                                align-items:center;
                                    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
                                        overflow:hidden;
                                        }

                                        .container{
                                            text-align:center;
                                            }

                                            h1{
                                                color:white;
                                                    margin-bottom:20px;
                                                        font-size:2rem;
                                                        }

                                                        .buttons{
                                                            display:flex;
                                                                gap:20px;
                                                                    justify-content:center;
                                                                    }

                                                                    button{
                                                                        border:none;
                                                                            padding:12px 30px;
                                                                                border-radius:30px;
                                                                                    cursor:pointer;
                                                                                        font-size:18px;
                                                                                            transition:0.3s;
                                                                                            }

                                                                                            #yes{
                                                                                                background:#ff4d88;
                                                                                                    color:white;
                                                                                                    }

                                                                                                    #no{
                                                                                                        background:white;
                                                                                                        }

                                                                                                        .result{
                                                                                                            display:none;
                                                                                                                text-align:center;
                                                                                                                }

                                                                                                                .result h2{
                                                                                                                    color:white;
                                                                                                                        margin-bottom:20px;
                                                                                                                        }

                                                                                                                        .result img{
                                                                                                                                width:300px;
                                                                                                                                    max-width:90%;
                                                                                                                                        border-radius:15px;
                                                                                                                                }
                                                                                                                                </style>
                                                                                                                                </head>

                                                                                                                                <body>

                                                                                                                                <div class="container" id="questionBox">
                                                                                                                                    <h1>Do you still love me Mansi? ❤️</h1>

                                                                                                                                        <div class="buttons">
                                                                                                                                                <button id="yes">Yes ❤️</button>
                                                                                                                                                        <button id="no">No 😢</button>
                                                                                                                                                            </div>
                                                                                                                                                            </div>

                                                                                                                                                            <div class="result" id="resultBox">
                                                                                                                                                                <h2>Yay! I knew you'd say YES bubu 💖</h2>

                                                                                                                                                                    <img src="https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUyeW94MzRod2RrOXIzaW14ZGpoeGEwdTltcTVsNnUyOWtyZnJnZDh6cyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/IajDdnR4qCY2R06vTg/giphy.gif"
                                                                                                                                                                         alt="Muah GIF">
                                                                                                                                                                             </div>

                                                                                                                                                                             <script>
                                                                                                                                                                             const noBtn = document.getElementById("no");

                                                                                                                                                                             noBtn.addEventListener("mouseover", () => {
                                                                                                                                                                                 const x = Math.random() * (window.innerWidth - 120);
                                                                                                                                                                                     const y = Math.random() * (window.innerHeight - 60);

                                                                                                                                                                                         noBtn.style.position = "absolute";
                                                                                                                                                                                             noBtn.style.left = x + "px";
                                                                                                                                                                                                 noBtn.style.top = y + "px";
                                                                                                                                                                                                 });

                                                                                                                                                                                                 document.getElementById("yes").addEventListener("click", () => {
                                                                                                                                                                                                     document.getElementById("questionBox").style.display = "none";
                                                                                                                                                                                                         document.getElementById("resultBox").style.display = "block";
                                                                                                                                                                                                         });
                                                                                                                                                                                                         </script>

                                                                                                                                                                                                         </body>
                                                                                                                                                                                                         </html>
